#Local MYSQL DB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_DB_HOST:localhost}:${MYSQL_DB_PORT:3330}/${MYSQL_DB_NAME:home_risk_check}?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_DB_USERNAME}
spring.datasource.password=${MYSQL_DB_PASSWORD}

#Local Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

public-data.service-key=${PUBLIC_DATA_SERVICE_KEY:temporary_key}
kakao.rest-api-key=${KAKAO_REST_API_KEY}
taas.api-key=${TAAS_API_KEY}

#JPA
spring.jpa.hibernate.ddl-auto=update